# =============================================================================
# config/config.yaml
# Workflow configuration for minimizer-sketching ENCODE validation experiments
# =============================================================================

# Output and scratch directories
outdir:  "/vast/blangme2/jbonnie/hammock/claude-ref-comparison/results"
scratch: "/vast/blangme2/jbonnie/hammock/claude-ref-comparison/scratch"

# Hammock entrypoint
sketch_bin: "python3 /home/jbonnie1/interval_sketch/hammock/hammock/hammock.py"

# Minimizer parameter sweep — all (k, w) combinations will be run
# Keep precision high; k and w intentionally low to start
# Parameter sweep — all (k, w) pairs where w >= k will be run.
# w < k causes silent degenerate sketches (zero minimizers per window,
# falls back to full-sequence hashing) so those combos are skipped at runtime.
kmer_sizes:   [3, 5, 7]
window_sizes: [5, 10, 15, 20]
precision:    24

# MACS2 genome size flags
macs_gsize:
  GRCh38: "hs"
  GRCh37: "hs"
  mm10:   "mm"

# =============================================================================
# CONTAINER IMAGES (Singularity)
# =============================================================================
containers:
  sra_tools:    "docker://ncbi/sra-tools:3.0.0"
  bwa_samtools: "docker://biocontainers/bwa-mem2:2.2.1"
  r_tidyverse:  "docker://rocker/tidyverse:4.3.0"
  samtools:     "docker://biocontainers/samtools:1.18"
  macs2:        "docker://biocontainers/macs2:2.2.9.1"
  bedtools:     "docker://biocontainers/bedtools:2.31.0"

# =============================================================================
# REFERENCE GENOMES
# =============================================================================
references:
  GRCh38:
    fasta: "/data/blangme2/jessica/mus_homo/references/grch38/GCA_000001405.15_GRCh38_no_alt_analysis_set.fna"
    bwa_index: "/data/blangme2/jessica/mus_homo/references/grch38/GCA_000001405.15_GRCh38_no_alt_analysis_set.fna"
    chromsizes: "/data/blangme2/jessica/mus_homo/references/grch38/GCA_000001405.15_GRCh38_no_alt_analysis_set.fna.fai"
  GRCh37:
    fasta: "/data/blangme2/jessica/mus_homo/references/hg19/hg19.fa"
    bwa_index: "/data/blangme2/jessica/mus_homo/references/hg19/hg19.fa"
    chromsizes: "/data/blangme2/jessica/mus_homo/references/hg19/hg19.fa.fai"
  mm10:
    fasta: "/data/blangme2/jessica/mus_homo/references/mm10/mm10_no_alt_analysis_set_ENCODE.fasta"
    bwa_index: "/data/blangme2/jessica/mus_homo/references/mm10/mm10_no_alt_analysis_set_ENCODE.fasta"
    chromsizes: "/data/blangme2/jessica/mus_homo/references/mm10/mm10_no_alt_analysis_set_ENCODE.fasta.fai"

# =============================================================================
# EXPERIMENT A: Cross-Reference Robustness
#   Same biological sample → aligned to GRCh37 AND GRCh38
#   Goal: sim(sample_i_hg37, sample_i_hg38) > sim(sample_i_hg37, sample_j_hg37)
# =============================================================================
#
# All SRR IDs confirmed; multiple runs per sample are merged in download_fastq.
samples:
  sra_map:
    # Values are lists — single-run samples have one entry; multi-run are merged.
    # Human Roadmap H3K27ac (GSE16256) — single run each
    E095_H3K27ac: ["SRR2173071"]        # GSM1127115, heart (Roadmap E095)
    E066_H3K27ac: ["SRR2172698"]        # GSM1127068, liver (Roadmap E066)
    E096_H3K27ac: ["SRR2173068"]        # GSM1127116, lung  (Roadmap E096; Exp A only)
    E067_H3K27ac: ["SRR2172802"]        # GSM1127069, brain angular gyrus (Roadmap E067)
    E113_H3K27ac: ["SRR2172782"]        # GSM1127132, spleen (Roadmap E113)
    E109_H3K27ac: ["SRR2172772"]        # GSM1127128, small intestine (Roadmap E109)
    # Mouse ENCODE LICR H3K27ac (GSE49847) — two runs each, merged on download
    # mm_lung_H3K27ac: H3K27ac absent from GSE49847 for lung — excluded from Exp B
    mm_heart_H3K27ac:  ["SRR566827", "SRR566828"]   # GSM1000093, adult 8wk heart
    mm_liver_H3K27ac:  ["SRR566921", "SRR566922"]   # GSM1000140, adult 8wk liver
    mm_brain_H3K27ac:  ["SRR566841", "SRR566842"]   # GSM1000100, adult 8wk cortex
    mm_spleen_H3K27ac: ["SRR566917", "SRR566918"]   # GSM1000138, adult 8wk spleen

  experiment_a:
    - id:     E095_H3K27ac
      mark:   H3K27ac
      tissue: heart
      species: human
      geo:    GSE16256
      encode: E095
      refs:   [GRCh37, GRCh38]
    - id:     E066_H3K27ac
      mark:   H3K27ac
      tissue: liver
      species: human
      geo:    GSE16256
      encode: E066
      refs:   [GRCh37, GRCh38]
    - id:     E096_H3K27ac
      mark:   H3K27ac
      tissue: lung
      species: human
      geo:    GSE16256
      encode: E096
      refs:   [GRCh37, GRCh38]

  experiment_b:
    # ── Human samples (Roadmap Epigenomics) ──────────────────────────────────
    # Source: GEO Superseries GSE16256
    # Roadmap Epigenomics Consortium (2015) Nature 518:317-330
    - id:     E095_H3K27ac
      mark:   H3K27ac
      tissue: heart
      species: human
      geo:    GSE16256
      encode: E095
      ref:    GRCh38
    - id:     E066_H3K27ac
      mark:   H3K27ac
      tissue: liver
      species: human
      geo:    GSE16256
      encode: E066
      ref:    GRCh38
    # lung excluded from Exp B: H3K27ac absent from GSE49847 (mouse); planned H3K4me3 extension will add it
    - id:     E067_H3K27ac
      mark:   H3K27ac
      tissue: brain_angular_gyrus
      species: human
      geo:    GSE16256
      encode: E067
      ref:    GRCh38
    - id:     E113_H3K27ac
      mark:   H3K27ac
      tissue: spleen
      species: human
      geo:    GSE16256
      encode: E113
      ref:    GRCh38
    - id:     E109_H3K27ac
      mark:   H3K27ac
      tissue: small_intestine
      species: human
      geo:    GSE16256
      encode: E109
      ref:    GRCh38
    # ── Mouse samples (Mouse ENCODE — LICR) ──────────────────────────────────
    # Source: GEO GSE49847
    # Yue et al. (2014) Nature 515:355-364
    - id:     mm_heart_H3K27ac
      mark:   H3K27ac
      tissue: heart
      species: mouse
      geo:    GSE49847
      ref:    mm10
    - id:     mm_liver_H3K27ac
      mark:   H3K27ac
      tissue: liver
      species: mouse
      geo:    GSE49847
      ref:    mm10
    # mm_lung_H3K27ac excluded: H3K27ac not present in GSE49847 for lung
    - id:     mm_brain_H3K27ac
      mark:   H3K27ac
      tissue: brain
      species: mouse
      geo:    GSE49847
      ref:    mm10
    - id:     mm_spleen_H3K27ac
      mark:   H3K27ac
      tissue: spleen
      species: mouse
      geo:    GSE49847
      ref:    mm10

